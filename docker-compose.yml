services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent_tasks
      POSTGRES_PASSWORD: agent_tasks
      POSTGRES_DB: agent_tasks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_tasks -d agent_tasks"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    working_dir: /app
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://agent_tasks:agent_tasks@db:5432/agent_tasks
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-dev-client-id}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-dev-client-secret}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-to-a-random-32-char-string!!}
    command: >
      bash -lc "npm run db:generate --workspace=backend &&
      npm run db:push --workspace=backend &&
      npm run dev --workspace=backend"
    volumes:
      - ./:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    working_dir: /app
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
    command: bash -lc "npm run dev --workspace=frontend"
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
