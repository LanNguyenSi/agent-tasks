services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent_tasks
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: agent_tasks
    volumes:
      - agent_tasks_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_tasks -d agent_tasks"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    # Idle ~36M; cap protects the host from a runaway query plan or
    # vacuum spike. Postgres scales connection pool / shared buffers
    # off this so 512M is comfortable for our workload (single-tenant,
    # small dataset). Bump if pg_stat_activity ever shows pressure.
    mem_limit: 512m
    networks:
      - internal

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      DATABASE_URL: postgresql://agent_tasks:${POSTGRES_PASSWORD}@db:5432/agent_tasks
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: "no"
    # One-shot prisma db push container; lives only for the duration
    # of the schema sync. 512M is far above what a single push uses,
    # leaving headroom for a future migrate-deploy that would need
    # more.
    mem_limit: 512m

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: prod
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://agent_tasks:${POSTGRES_PASSWORD}@db:5432/agent_tasks
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      FRONTEND_URL: https://agent-tasks.opentriologue.ai
      CORS_ORIGINS: https://agent-tasks.opentriologue.ai
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      # Optional — gates the identity-broker register endpoint. Empty by
      # default (back-compat accept-any); set in prod .env to restrict.
      ALLOWED_GITHUB_LOGINS: ${ALLOWED_GITHUB_LOGINS:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    # Idle ~92M, request-burst peak observed ~250M. 768M caps without
    # constraining normal traffic and prevents a runaway request
    # handler from eating the whole host on a memory-leak regression.
    mem_limit: 768m
    networks:
      - internal
      - traefik
    labels:
      traefik.enable: "true"
      traefik.http.routers.agent-tasks-api.rule: Host(`agent-tasks.opentriologue.ai`) && (PathPrefix(`/api`) || PathPrefix(`/docs`))
      traefik.http.routers.agent-tasks-api.entrypoints: websecure
      traefik.http.routers.agent-tasks-api.tls.certresolver: letsencrypt
      traefik.http.services.agent-tasks-api.loadbalancer.server.port: "3001"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_API_URL: https://agent-tasks.opentriologue.ai
    environment:
      NODE_ENV: production
      API_URL: http://backend:3001
    depends_on:
      - backend
    restart: unless-stopped
    # Next.js production server. Idle ~152M but the SSR path can spike
    # briefly under traffic; 1G keeps that headroom while still
    # capping a runaway worker. Combined with the other caps above the
    # whole stack tops out at ~2.8G under normal operation, leaving
    # ample room for the build process during deploy on a 7.7G host.
    mem_limit: 1g
    networks:
      - internal
      - traefik
    labels:
      traefik.enable: "true"
      traefik.http.routers.agent-tasks.rule: Host(`agent-tasks.opentriologue.ai`)
      traefik.http.routers.agent-tasks.entrypoints: websecure
      traefik.http.routers.agent-tasks.tls.certresolver: letsencrypt
      traefik.http.services.agent-tasks.loadbalancer.server.port: "3000"

volumes:
  agent_tasks_postgres:

networks:
  internal:
  traefik:
    external: true
