name: Bug report
description: Report a defect in agent-tasks
labels: ["bug"]
body:
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - backend
        - frontend
        - cli
        - mcp-bridge
        - mcp-server
        - hosted instance (agent-tasks.opentriologue.ai)
        - other / unsure
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Expected vs. actual behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal commands or actions that trigger the bug.
      render: bash
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit SHA
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "self-hosted (Docker), local dev, hosted instance"
