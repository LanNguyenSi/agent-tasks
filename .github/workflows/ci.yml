name: CI

on:
  push:
    branches: [master, main, develop, "release/*"]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agent_tasks
          POSTGRES_PASSWORD: agent_tasks
          POSTGRES_DB: agent_tasks_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://agent_tasks:agent_tasks@localhost:5432/agent_tasks_test
        run: npm run db:generate --workspace=backend

      - name: Type check
        run: npm run typecheck --workspace=backend

      - name: Run tests
        env:
          DATABASE_URL: postgresql://agent_tasks:agent_tasks@localhost:5432/agent_tasks_test
          GITHUB_CLIENT_ID: test-client-id
          GITHUB_CLIENT_SECRET: test-client-secret
          SESSION_SECRET: test-session-secret-must-be-32chars!!
          NODE_ENV: test
        run: npm run test --workspace=backend

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck --workspace=frontend

      - name: Build
        run: npm run build --workspace=frontend
